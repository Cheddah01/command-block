<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>editor / cozy-crafters/ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>

<div class="layout">

  <aside>
    <div class="brand">
      <span class="dot"></span>
      <h1>cozy-crafters<span class="ver">/ops</span></h1>
    </div>

    <div class="meta">
      <div class="row"><span>build</span><span>paper 1.21</span></div>
      <div class="row"><span>season</span><span>02</span></div>
      <div class="row live"><span>status</span><span>online</span></div>
    </div>

    <nav>
      <div class="group">
        <h2>ops/</h2>
        <ul>
          <li><a href="index.html">index</a></li>
          <li><a href="plugins.html">plugins</a></li>
          <li><a href="configs.html" class="active">configs</a></li>
          <li><a href="reference.html">reference</a></li>
        </ul>
      </div>
    </nav>
  </aside>

  <main class="wide">

    <div class="crumb">
      ~<span class="sep">/</span>ops<span class="sep">/</span><a href="configs.html">configs</a><span class="sep">/</span><span id="crumb-name">…</span>
    </div>

    <div class="doc-head">
      <div class="kicker" id="header-meta">internal · config editor</div>
      <h1 id="header-title">loading…</h1>
    </div>

    <div class="action-bar">
      <button class="btn primary" id="save-btn">save version</button>
      <input type="text" class="save-note" id="save-note" placeholder="optional note (e.g. 'fixed prefix bug')">
      <span class="spacer"></span>
      <span class="status" id="status">—</span>
      <a class="btn" id="download-btn">download</a>
    </div>

    <div class="editor-wrap">
      <div class="editor-host" id="editor"></div>

      <div>
        <div class="sec-head">
          <h2><span class="num">[v]</span>history</h2>
        </div>
        <div class="versions" id="versions">
          <div class="empty">loading…</div>
        </div>
      </div>
    </div>

    <footer>
      <span>cozy-crafters/ops · season 02</span>
      <span id="footer-status">—</span>
    </footer>

  </main>
</div>

<script type="module" src="/src/config.js"></script>

</body>
</html>
